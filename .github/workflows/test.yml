name: Test

on:
  push:
    branches: [main]
  pull_request:

jobs:
  rustfmt:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@nightly
        with:
          components: rustfmt
      - run: cargo fmt --all -- --check

  clippy:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - codec: postcard
            features: "--all-features"
          - codec: pot
            features: "--no-default-features --features iter-ext,codec-pot"
    name: clippy (${{ matrix.codec }})

    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@nightly
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo clippy ${{ matrix.features }} -- -D warnings

  doc-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - codec: postcard
            features: "--all-features"
          - codec: pot
            features: "--no-default-features --features iter-ext,macros,codec-pot"
    name: doc-test (${{ matrix.codec }})

    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Run doctest
        run: cargo test --doc ${{ matrix.features }}

  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - codec: postcard
            script: "npm test"
          - codec: pot
            script: "npm run test:pot"
    name: test (${{ matrix.codec }})

    steps:
      - uses: actions/checkout@v4
      - name: Install npm
        working-directory: ./test
        run: npm ci
      - name: Install wasm-pack
        run: curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh
      - name: Run tests
        working-directory: ./test
        run: ${{ matrix.script }}
